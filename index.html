<!doctype html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="UwU Books – Verwaltungsseite für eine Bücherei im GTA RP.">
  <meta name="theme-color" content="#ff7abf">
  <meta name="uwu-app-version" content="2026.06.01.1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests">
  <title>UwU Books</title>
  <link rel="icon" href="assets/uwu-books-icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preload" href="css/styles.css?v=2026.06.01.1" as="style">
  <link rel="stylesheet" href="css/styles.css?v=2026.06.01.1">
</head>
<body>
  <div class="app-shell">
    <header class="hero glass-card">
      <div class="hero__brand hero__brand--image">
        <img src="assets/uwu-books-header.png" alt="UwU Books" class="hero-banner-image">
        <h1 class="sr-only">UwU Books</h1>
      </div>

      <div class="hero__actions" aria-label="Aktionen">
        <button class="icon-button" id="exportJsonBtn" title="Sicherung speichern" aria-label="Sicherung speichern">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 1 1v8.58l2.3-2.29a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.29V4a1 1 0 0 1 1-1ZM5 18a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v1.2c0 .99-.81 1.8-1.8 1.8H5.8A1.8 1.8 0 0 1 4 20.2V19a1 1 0 0 1 1-1Z"/></svg>
        </button>
        <button class="icon-button" id="exportCsvBtn" title="Liste als Tabelle speichern" aria-label="Liste als Tabelle speichern">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h9l5 5v13H5V3Zm8 1.5V9h4.5L13 4.5ZM7.5 13a1.5 1.5 0 0 0-1.5 1.5v1A1.5 1.5 0 0 0 7.5 17H9v-1.3H7.6a.3.3 0 0 1-.3-.3v-.8c0-.17.13-.3.3-.3H9V13H7.5Zm3 0v4h2a1.2 1.2 0 0 0 1.2-1.2v-1.6A1.2 1.2 0 0 0 12.5 13h-2Zm1.2 1.2h.55c.14 0 .25.11.25.25v1.1c0 .14-.11.25-.25.25h-.55v-1.6Zm3.2-1.2v4h1.3v-1.35h1.35V14.4H16.2v-.2h1.8V13h-3.1Z"/></svg>
        </button>
        <label class="icon-button file-button" title="Sicherung einspielen" aria-label="Sicherung einspielen">
          <input type="file" id="importJsonInput" accept="application/json,.json" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21a1 1 0 0 1-1-1v-8.58l-2.3 2.29a1 1 0 0 1-1.4-1.42l4-4a1 1 0 0 1 1.4 0l4 4a1 1 0 1 1-1.4 1.42L13 11.42V20a1 1 0 0 1-1 1ZM5.8 2h12.4C19.2 2 20 2.8 20 3.8V5a1 1 0 1 1-2 0V4H6v1a1 1 0 0 1-2 0V3.8C4 2.8 4.8 2 5.8 2Z"/></svg>
        </label>
      </div>
    </header>

    <main class="main-grid">
      <section class="panel glass-card form-panel" aria-labelledby="formTitle">
        <div class="panel__header">
          <div>
            <p class="eyebrow">Eintrag</p>
            <h2 id="formTitle">Buch eintragen</h2>
          </div>
          <button class="ghost-button" id="resetFormBtn" type="button">Formular leeren</button>
        </div>

        <form id="bookForm" class="book-form" autocomplete="off">
          <input type="hidden" id="entryId">

          <div class="field-grid field-grid--two">
            <label class="field">
              <span>Vorname</span>
              <input id="firstName" name="firstName" type="text" placeholder="Vorname" required maxlength="60">
            </label>
            <label class="field">
              <span>Nachname</span>
              <input id="lastName" name="lastName" type="text" placeholder="Nachname" required maxlength="60">
            </label>
          </div>

          <div class="field-grid field-grid--two">
            <label class="field">
              <span>Telefonnummer</span>
              <input id="phone" name="phone" type="tel" inputmode="numeric" pattern="[0-9+\-()\s]*" title="Erlaubt sind Zahlen sowie +, -, Klammern und Leerzeichen." placeholder="Telefonnummer" maxlength="24" autocomplete="off">
            </label>
            <label class="field">
              <span>Pseudonym</span>
              <input id="pseudonym" name="pseudonym" type="text" placeholder="Pseudonym" maxlength="80">
            </label>
          </div>

          <label class="field">
            <span>Kontodaten</span>
            <input id="accountData" name="accountData" type="text" placeholder="Kontodaten / Zahlungsinfo" maxlength="120">
          </label>

          <label class="field">
            <span>Buchtitel</span>
            <input id="bookTitle" name="bookTitle" type="text" placeholder="Buchtitel" required maxlength="140">
          </label>

          <div class="field-grid field-grid--two">
            <label class="field">
              <span>Abgegeben am</span>
              <input id="submittedDate" name="submittedDate" type="date" required>
            </label>
            <label class="field">
              <span>Veröffentlicht am</span>
              <input id="publishedDate" name="publishedDate" type="date">
            </label>
          </div>

          <div class="field-grid field-grid--three">
            <label class="field toggle-field">
              <span>Im Lektorat</span>
              <button class="toggle" id="editorialToggle" type="button" role="switch" aria-checked="false">
                <span class="toggle__knob"></span>
                <strong>Nein</strong>
              </button>
              <input id="inEditorial" name="inEditorial" type="hidden" value="Nein">
            </label>
            <label class="field">
              <span>Übernommen von</span>
              <input id="takenBy" name="takenBy" type="text" placeholder="Name oder Kürzel" maxlength="80">
            </label>
            <label class="field">
              <span>Bearbeitungsstatus</span>
              <select id="workStatus" name="workStatus">
                <option value="Offen">Offen</option>
                <option value="In Bearbeitung">In Bearbeitung</option>
                <option value="Abgeschlossen">Abgeschlossen</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>Anmerkungen</span>
            <textarea id="notes" name="notes" rows="3" placeholder="Anmerkung oder Hinweis …" maxlength="500"></textarea>
          </label>

          <div class="form-actions">
            <button class="primary-button" id="saveBtn" type="submit">Eintrag speichern</button>
          </div>
        </form>
      </section>

      <section class="panel glass-card list-panel" aria-labelledby="listTitle">
        <div class="panel__header panel__header--wrap">
          <div>
            <p class="eyebrow">Übersicht</p>
            <h2 id="listTitle">Bücherliste</h2>
          </div>
          <div class="stats" aria-label="Statistiken">
            <div class="stat-card"><span id="totalCount">0</span><small>Gesamt</small></div>
            <div class="stat-card"><span id="publishedCount">0</span><small>In Bearbeitung</small></div>
            <div class="stat-card"><span id="editorialCount">0</span><small>Lektorat</small></div>
          </div>
        </div>

        <div class="toolbar">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 0 1 5.17 10.44l3.45 3.44a1 1 0 0 1-1.41 1.41l-3.45-3.44A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"/></svg>
            <input id="searchInput" type="search" placeholder="Name, Titel, Telefon, Pseudonym oder Bearbeitung suchen …">
          </label>
          <select id="statusFilter" aria-label="Bearbeitungsstatus filtern">
            <option value="Alle">Alle Bearbeitungsstände</option>
            <option value="Offen">Offen</option>
            <option value="In Bearbeitung">In Bearbeitung</option>
            <option value="Abgeschlossen">Abgeschlossen</option>
          </select>
          <button class="ghost-button confirmation-reset-button" id="restoreConfirmBtn" type="button" hidden>Nachfragen wieder anzeigen</button>
          <button class="danger-soft-button" id="deleteAllBtn" type="button">Liste leeren</button>
          <div class="bulk-toolbar" id="bulkToolbar" hidden aria-live="polite">
            <span class="bulk-count" id="bulkCount">0 ausgewählt</span>
            <button class="ghost-button compact-button" id="bulkExportJsonBtn" type="button">Auswahl speichern</button>
            <button class="ghost-button compact-button" id="bulkExportCsvBtn" type="button">Auswahl als Tabelle</button>
            <button class="danger-soft-button compact-button" id="deleteSelectedBtn" type="button">Auswahl löschen</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="book-table">
            <colgroup>
              <col class="col-select">
              <col class="col-person">
              <col class="col-title">
              <col class="col-status">
              <col class="col-contact">
              <col class="col-actions">
            </colgroup>
            <thead>
              <tr>
                <th class="select-column">
                  <label class="row-check row-check--head" title="Sichtbare Einträge markieren">
                    <input type="checkbox" id="selectVisibleCheckbox" aria-label="Alle sichtbaren Einträge markieren">
                    <span class="row-check__box" aria-hidden="true"></span>
                  </label>
                </th>
                <th>Person</th>
                <th>Buchtitel</th>
                <th>Bearbeitung</th>
                <th>Kontakt</th>
                <th>Aktionen</th>
              </tr>
            </thead>
            <tbody id="entriesTbody"></tbody>
          </table>
          <div class="empty-state" id="emptyState">
            <img src="assets/uwu-books-icon.svg" alt="" aria-hidden="true">
            <h3>Noch keine Einträge</h3>
            <p>Lege links einen Eintrag an oder spiele eine Sicherung ein.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <article class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
      <div class="confirm-modal__icon" id="confirmIcon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M12 3.25c4.2 0 7.75 3.45 7.75 7.72 0 5.1-4.93 8.42-7.12 9.66a1.25 1.25 0 0 1-1.26 0c-2.2-1.24-7.12-4.56-7.12-9.66C4.25 6.7 7.8 3.25 12 3.25Zm0 4.2a.9.9 0 0 0-.9.9v4.1a.9.9 0 1 0 1.8 0v-4.1a.9.9 0 0 0-.9-.9Zm0 7.35a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2Z"/>
        </svg>
      </div>
      <div class="confirm-modal__content">
        <h3 id="confirmTitle">Noch mal prüfen</h3>
        <p id="confirmMessage">Möchtest du fortfahren?</p>
        <div class="confirm-preview" id="confirmPreview" hidden></div>
        <label class="confirm-skip" id="confirmSkipWrap">
          <input id="confirmSkipCheckbox" type="checkbox">
          <span class="confirm-skip__box" aria-hidden="true"></span>
          <span class="confirm-skip__text">Nicht erneut anzeigen</span>
        </label>
        <div class="confirm-modal__actions">
          <button class="secondary-button" id="confirmCancelBtn" type="button">Abbrechen</button>
          <button class="danger-button" id="confirmOkBtn" type="button">Bestätigen</button>
        </div>
      </div>
    </article>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <script defer src="js/config.js?v=2026.06.01.1"></script>
  <script defer src="js/storage.js?v=2026.06.01.1"></script>
  <script defer src="js/ui.js?v=2026.06.01.1"></script>
  <script defer src="js/app.js?v=2026.06.01.1"></script>
  <script defer src="js/update.js?v=2026.06.01.1"></script>
</body>
</html>
